services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: prism
      POSTGRES_USER: prism
      POSTGRES_PASSWORD: prism
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  elasticmq:
    image: softwaremill/elasticmq-native:latest
    ports:
      - "9324:9324"
      - "9325:9325"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

volumes:
  postgres_data:
