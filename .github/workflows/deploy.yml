name: Deploy to AWS

# Triggers on every push to main. Tests must pass before the deploy job runs.
# Uses GitHub OIDC (no stored AWS keys) to assume the CDK-created deploy role.
#
# Required GitHub repository secrets / variables:
#   AWS_ROLE_ARN    — the OidcRoleArn output from `cdk deploy` (Settings → Secrets)
#   AWS_REGION      — eu-central-1
#   ECR_REPO        — 186048966015.dkr.ecr.eu-central-1.amazonaws.com/prism-backend
#   ECS_CLUSTER     — prism
#   ECS_SERVICE     — prism-backend

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: backend tests
  # Runs the mocked test suite (no live DB required — DB-touching tests use mocks).
  # A postgres service container is provided for tests that DO hit the DB.
  # ---------------------------------------------------------------------------
  test:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: prism
          POSTGRES_PASSWORD: prism
          POSTGRES_DB: prism
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://prism:prism@localhost:5432/prism
      # Dummy value — mocked tests don't call live APIs.
      ANTHROPIC_API_KEY: test-key

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest (mocked tests — no live API calls)
        # Exclude the eval tests (they require fixtures + optional API key)
        # and the live synthesiser test. Those run in eval.yml separately.
        run: pytest tests/ -v --ignore=tests/test_eval.py --ignore=tests/test_synthesiser.py -x

  # ---------------------------------------------------------------------------
  # Job 2: build, push, and redeploy
  # Uses GitHub OIDC — no AWS keys stored in GitHub secrets.
  # ---------------------------------------------------------------------------
  deploy:
    name: Build, push, and redeploy
    runs-on: ubuntu-latest
    needs: test

    # OIDC requires explicit permission to request the JWT token.
    permissions:
      id-token: write
      contents: read

    env:
      AWS_REGION: eu-central-1
      ECR_REPO: ${{ secrets.ECR_REPO }}
      ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
      ECS_SERVICE: ${{ secrets.ECS_SERVICE }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-central-1
          # Inline policy is already on the role; no extra session tags needed.

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push Docker image
        run: |
          IMAGE_TAG="${{ github.sha }}"
          docker build -t "$ECR_REPO:latest" -t "$ECR_REPO:$IMAGE_TAG" backend/
          docker push "$ECR_REPO:latest"
          docker push "$ECR_REPO:$IMAGE_TAG"

      - name: Force new ECS deployment
        # This picks up the new :latest image. The circuit breaker in the CDK
        # stack will roll back automatically if the new task fails health checks.
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION" \
            --output text \
            --query "service.serviceName"
